apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: enterprise-prometheus
  namespace: argocd
  labels:
    app.kubernetes.io/name: enterprise-prometheus
    app.kubernetes.io/part-of: enterprise-platform
  annotations:
    argocd.argoproj.io/sync-wave: "20"
spec:
  project: enterprise-platform
  source:
    repoURL: git://git-server.argocd.svc.cluster.local/repo-20260622193208.git
    targetRevision: main
    path: kubernetes/prometheus
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
