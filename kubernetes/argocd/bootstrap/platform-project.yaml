apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: enterprise-platform
  namespace: argocd
  labels:
    app.kubernetes.io/name: enterprise-platform
    app.kubernetes.io/part-of: enterprise-platform
spec:
  description: Enterprise platform workloads managed through GitOps
  sourceRepos:
    - git://git-server.argocd.svc.cluster.local/repo-20260622193208.git
  destinations:
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: platform-applications
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc
    - namespace: kube-system
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
    - group: ""
      kind: PersistentVolume
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
    - group: apiregistration.k8s.io
      kind: APIService
    - group: rbac.authorization.k8s.io
      kind: ClusterRole
    - group: rbac.authorization.k8s.io
      kind: ClusterRoleBinding
    - group: storage.k8s.io
      kind: StorageClass
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
